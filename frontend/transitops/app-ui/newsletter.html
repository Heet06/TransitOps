<body>
    <section class="bg-body-tertiary">
        <div class="container d-flex min-vh-100 justify-content-center align-items-center py-5">
            <div class="card w-100 max-w-400">
                <div class="card-body text-center">
                    <div class="mb-3"><svg class="bi bi-envelope" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16" style="font-size:70px;">
                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"></path>

                    <h1 class="fs-5 mb-1">Subscribe to our newsletter</h1>
                    <p class="small text-muted mb-4">Get the latest updates and news delivered to your inbox</p>
                    <form>
                        <div class="mb-3"><input class="form-control" type="email" id="email" name="email" placeholder="email@example.com" required=""></div>
                        <div class="d-grid gap-2"><button class="btn btn-primary" type="submit">Subscribe</button></div>
                        <div class="small text-center mt-4"><span>Already subscribed? </span><a href="newsletter-preferences.html" data-bs-toggle="modal" data-bs-target="#preferencesModal">Manage preferences</a></div>
                    </form>
                </div>
            </div>
