                <div class="d-flex justify-content-center gap-2 justify-content-md-start"><a class="text-decoration-none link-body-emphasis d-inline-flex align-items-center" href="#"><svg class="bi bi-circle-square me-2" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16">
